<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言審查 - ScholarLink 系統管理員</title>
  <script src="auth.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Sans+3:wght@400;600&display=swap');
    :root {
      --bg: #0f172a;
      --card: #111827;
      --surface: #0b1220;
      --accent: #7dd3fc;
      --accent-strong: #22d3ee;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 14px;
      --danger: rgba(244,63,94,0.15);
      --danger-text: #fda4af;
      --danger-border: rgba(244,63,94,0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.06), transparent 25%),
                  radial-gradient(circle at 80% 10%, rgba(14,165,233,0.07), transparent 26%),
                  radial-gradient(circle at 50% 80%, rgba(56,189,248,0.05), transparent 30%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; letter-spacing: 0.5px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .brand .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 18px rgba(125,211,252,0.6);
    }
    nav a {
      color: var(--muted); text-decoration: none;
      margin-left: 18px; font-weight: 600;
      transition: color 0.2s ease;
    }
    nav a:hover { color: var(--accent-strong); }
    nav a.active { color: var(--accent-strong); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 22px 60px; }
    .hero {
      margin: 28px 0 20px; padding: 26px; border-radius: 16px;
      background: linear-gradient(120deg, rgba(244,63,94,0.2), rgba(8,47,73,0.65)),
                  linear-gradient(180deg, rgba(15,23,42,0.9), rgba(15,23,42,0.8));
      border: 1px solid rgba(244,63,94,0.3);
      box-shadow: var(--shadow); display: grid; gap: 8px;
    }
    .hero h1 { margin: 0; font-size: 28px; letter-spacing: 0.3px; }
    .hero p { margin: 0; color: var(--muted); }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 18px 20px;
      box-shadow: var(--shadow); margin-bottom: 18px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 700;
      margin: 0 0 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .pill {
      padding: 4px 10px; border-radius: 999px; font-size: 12px;
      background: rgba(125,211,252,0.15); color: var(--accent-strong);
      border: 1px solid rgba(125,211,252,0.35);
    }
    .pill.danger {
      background: rgba(244,63,94,0.15); color: #fda4af;
      border-color: rgba(244,63,94,0.3);
    }
    .msg-list { display: grid; gap: 14px; }
    .msg-item {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; background: rgba(255,255,255,0.02);
      position: relative;
    }
    .msg-item:hover { border-color: rgba(125,211,252,0.25); }
    .msg-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 8px;
    }
    .msg-title { font-size: 16px; font-weight: 700; color: var(--accent); margin: 0; }
    .msg-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .msg-content {
      color: var(--text); font-size: 14px; margin: 8px 0;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-reply {
      margin-top: 10px; padding: 10px 14px;
      background: rgba(34,211,238,0.06); border-radius: 10px;
      border-left: 3px solid var(--accent-strong);
      font-size: 13px; color: var(--muted);
    }
    .msg-reply strong { color: var(--accent-strong); }
    .btn-del {
      padding: 7px 13px; border-radius: 8px; border: 1px solid var(--danger-border);
      background: var(--danger); color: var(--danger-text);
      cursor: pointer; font-size: 13px; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-del:hover { background: rgba(244,63,94,0.28); }
    .empty { text-align: center; color: var(--muted); padding: 32px 0; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .stat-badge {
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
      background: rgba(125,211,252,0.1); border: 1px solid rgba(125,211,252,0.2);
      color: var(--accent-strong);
    }
    footer {
      margin-top: 40px; color: var(--muted); font-size: 13px;
      text-align: center; padding: 20px 0 40px;
    }
    @media (max-width: 720px) {
      .hero h1 { font-size: 22px; }
      nav a { display: none; }
      .msg-header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><span class="dot"></span>ScholarLink <span style="font-size:14px; color: var(--accent-strong); margin-left:8px;">系統管理員</span></div>
      <nav>
        <a href="admin_scholarships.html">獎助管理</a>
        <a href="admin_announcements.html">公告管理</a>
        <a href="admin_identity_proof.html">身份文件管理</a>
        <a href="admin_accounts.html">帳號管理</a>
        <a href="admin_messages.html" class="active">留言審查</a>
        <a href="admin_memos.html">備忘錄</a>
        <a href="/scholarship/pages/login.html">登出</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <section class="hero">
      <h1>🛡️ 留言審查</h1>
      <p>審查全站公開留言，刪除不當或違規內容。本頁面僅顯示「公開（Public）」留言。</p>
    </section>

    <div class="stats">
      <span class="stat-badge" id="totalCount">載入中...</span>
    </div>

    <section class="card">
      <div class="section-title">
        公開留言列表 <span class="pill danger">Public 僅限</span>
      </div>
      <div class="msg-list" id="msgList">
        <div class="empty">載入中...</div>
      </div>
    </section>
  </div>

  <footer>
    ScholarLink 系統管理員端 © 2026 ·
    <a href="/scholarship/pages/login.html" style="color:var(--accent-strong); text-decoration:none;">返回登入頁</a>
  </footer>

  <script>
    const API_BASE = '/scholarship/api';
    let currentUser = null;

    async function loadMessages() {
      try {
        const res = await fetch(`${API_BASE}/messages?viewer_id=${encodeURIComponent(currentUser.id)}`);
        const result = await res.json();
        if (!result.success) throw new Error(result.message || '載入失敗');

        // 管理員只顯示 Public 留言
        const publicMsgs = (result.data || []).filter(m => m.visibility === 'Public');
        document.getElementById('totalCount').textContent = `共 ${publicMsgs.length} 則公開留言`;
        renderMessages(publicMsgs);
      } catch (err) {
        document.getElementById('msgList').innerHTML =
          `<div class="empty" style="color:#f87171;">${err.message || '載入失敗'}</div>`;
        document.getElementById('totalCount').textContent = '載入失敗';
      }
    }

    function renderMessages(items) {
      const list = document.getElementById('msgList');
      if (!items.length) {
        list.innerHTML = '<div class="empty">目前沒有公開留言</div>';
        return;
      }
      list.innerHTML = items.map(m => {
        const createdAt = m.created_at ? new Date(m.created_at).toLocaleString('zh-TW') : '-';
        const content = escHtml(m.content || '');
        const replyHtml = m.reply_content
          ? `<div class="msg-reply">
               <strong>💬 ${escHtml(m.reply_user_name || '回覆者')}</strong>（${m.replied_at ? new Date(m.replied_at).toLocaleString('zh-TW') : '-'}）<br>
               ${escHtml(m.reply_content)}
             </div>`
          : '';
        return `
          <div class="msg-item">
            <div class="msg-header">
              <div>
                <p class="msg-title">${escHtml(m.title || '（無標題）')}</p>
                <p class="msg-meta">
                  🧑 ${escHtml(m.author_name || m.user_id)} &nbsp;·&nbsp; 🕐 ${createdAt}
                </p>
              </div>
              <button class="btn-del" onclick="deleteMessage('${m.id}', this)">❌ 刪除違規留言</button>
            </div>
            <div class="msg-content">${content}</div>
            ${replyHtml}
          </div>
        `;
      }).join('');
    }

    async function deleteMessage(msgId, btn) {
      if (!confirm('確定要刪除這則違規留言嗎？此操作無法復原。')) return;
      btn.disabled = true;
      btn.textContent = '刪除中...';
      try {
        const res = await fetch(`${API_BASE}/messages/${msgId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ operator_id: currentUser.id })
        });
        const result = await res.json();
        if (!res.ok || !result.success) throw new Error(result.message || '刪除失敗');
        btn.closest('.msg-item').remove();
        // 更新計數
        const remaining = document.querySelectorAll('.msg-item').length;
        document.getElementById('totalCount').textContent = `共 ${remaining} 則公開留言`;
        if (remaining === 0) {
          document.getElementById('msgList').innerHTML = '<div class="empty">目前沒有公開留言</div>';
        }
      } catch (err) {
        alert(err.message || '刪除失敗');
        btn.disabled = false;
        btn.textContent = '❌ 刪除違規留言';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 防禦：非管理員直接跳出
      currentUser = checkAuth(['SystemAdministrator']);
      if (!currentUser) return;
      loadMessages();
    });
  </script>
</body>
</html>
